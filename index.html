<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario: Valor del Acompañamiento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Informe: Valor del Acompañamiento</h1>
    
    <form id="questForm" action="https://formspree.io/f/mrejlwlb" method="POST">
        
        <!-- SECCIÓN I -->
        <section>
            <h2>I. Perfil General</h2>
            <div class="form-group">
                <label>Número total de personas atendidas:</label>
                <input type="number" name="Total_Atendidas" required>
            </div>
            <div class="grid">
                <div class="form-group">
                    <label>Nacionalidad Española (%)</label>
                    <input type="number" name="Nacionalidad_ES_porcentaje">
                </div>
                <div class="form-group">
                    <label>Situación Administrativa Irregular (%)</label>
                    <input type="number" name="Situacion_Irregular_porcentaje">
                </div>
            </div>
        </section>

        <!-- SECCIÓN II -->
        <section>
            <h2>II. Áreas de Acompañamiento</h2>
            <p><small>Marca las áreas para activar sus campos de datos:</small></p>
            
            <!-- Área Salud -->
            <div class="area-card" id="card-salud">
                <label class="checkbox-main">
                    <input type="checkbox" id="check-salud" onchange="toggleArea('salud')"> Área de SALUD
                </label>
                <div id="fields-salud" class="area-fields hidden">
                    <div class="grid">
                        <div class="form-group">
                            <label>Nº beneficiados</label>
                            <input type="number" name="Salud_Numero">
                        </div>
                        <div class="form-group">
                            <label>% sobre total</label>
                            <input type="number" name="Salud_Porcentaje">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Área Empleo -->
            <div class="area-card" id="card-empleo">
                <label class="checkbox-main">
                    <input type="checkbox" id="check-empleo" onchange="toggleArea('empleo')"> Área de EMPLEO
                </label>
                <div id="fields-empleo" class="area-fields hidden">
                    <div class="grid">
                        <div class="form-group">
                            <label>Nº beneficiados</label>
                            <input type="number" name="Empleo_Numero">
                        </div>
                        <div class="form-group">
                            <label>% inserción</label>
                            <input type="number" name="Empleo_Porcentaje">
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- SECCIÓN III -->
        <section>
            <h2>III. Prestaciones y Barreras</h2>
            <div class="form-group">
                <label>¿Qué % accedió a nuevas prestaciones?</label>
                <select name="Rango_Nuevas_Prestaciones">
                    <option value="0-25%">0-25%</option>
                    <option value="25-50%">25-50%</option>
                    <option value="50-75%">50-75%</option>
                    <option value="75-100%">75-100%</option>
                </select>
            </div>
            <div class="form-group">
                <label>Principales barreras detectadas:</label>
                <div class="checkbox-list">
                    <label><input type="checkbox" name="Barrera_Padron" value="Si"> Falta de empadronamiento</label>
                    <label><input type="checkbox" name="Barrera_Irregular" value="Si"> Situación irregular</label>
                    <label><input type="checkbox" name="Barrera_Digital" value="Si"> Brecha digital</label>
                </div>
            </div>
        </section>

        <button type="submit" id="submitBtn" class="btn-submit">Enviar Datos al Informe</button>
        <p id="form-status"></p>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
